spring.application.name=SkipQ-backend

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/skipq_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server port
server.port=8080

# OpenAI Chat Assistant Configuration
openai.api.base-url=${OPENAI_API_BASE_URL:https://api.openai.com/v1}
openai.api.key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-4.1-mini}
